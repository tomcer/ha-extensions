# --- Jednorázový ohřev TUV (vypne časový plán → TČ ohřeje hned → zapne zpět) ---
- id: acond_dhw_boost
  alias: "Acond - Jednorázový ohřev TUV"
  trigger:
    - platform: state
      entity_id: input_boolean.acond_dhw_boost
      to: "on"
  action:
    # Vypneme TUV časový plán přes HTTP POST (není v Modbus protokolu)
    - service: shell_command.acond_dhw_schedule_off
    # Počkáme až TČ začne ohřívat TUV (TC_status bit 3)
    - wait_template: >
        {{ is_state('binary_sensor.acond_ohrev_tuv', 'on') }}
      timeout: "00:10:00"
      continue_on_timeout: true
    # Počkáme až ohřev skončí
    - wait_template: >
        {{ is_state('binary_sensor.acond_ohrev_tuv', 'off') }}
      timeout: "02:00:00"
      continue_on_timeout: true
    # Zapneme TUV plán zpět
    - service: shell_command.acond_dhw_schedule_on
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.acond_dhw_boost

# --- Ruční vypnutí boostu → zapne plán zpět ---
- id: acond_dhw_boost_off
  alias: "Acond - Vypnout boost TUV"
  trigger:
    - platform: state
      entity_id: input_boolean.acond_dhw_boost
      to: "off"
  action:
    - service: shell_command.acond_dhw_schedule_on

# --- Posílání teploty ze Zigbee senzoru do TČ jako T_act_indoor2 ---
# Holding reg 40004 (addr 3) = aktuální teplota místnosti okruh 2
# Write FC6 ověřen testem - holding[3] přijímá hodnotu, TČ ji použije místo čidla
- id: acond_send_indoor2_temp
  alias: "Acond - Poslat teplotu okruh 2 (ZB→TČ)"
  trigger:
    - platform: state
      entity_id: sensor.temp_okruh_2_temperature
    - platform: time_pattern
      minutes: "/5"
  condition:
    - condition: template
      value_template: >
        {{ states('sensor.temp_okruh_2_temperature') not in ['unknown', 'unavailable'] }}
  action:
    - service: modbus.write_register
      data:
        hub: acond
        slave: 2
        address: 3
        value: "{{ (states('sensor.temp_okruh_2_temperature') | float * 10) | int }}"

# --- Kvitace alarmu (TC_set bit 5 = 32, holding reg 40006, addr 5) ---
- id: acond_alarm_acknowledge
  alias: "Acond - Kvitace alarmu"
  trigger:
    - platform: state
      entity_id: input_button.acond_alarm_ack
  action:
    - service: modbus.write_register
      data:
        hub: acond
        slave: 2
        address: 5
        value: 32
