# =============================================================================
# Acond TČ - Automatizace pro ovládání
# Firmware: ModbusTCP v2.34+ (zápis teplot přes Modbus, TUV plán přes HTTP)
# Přidej do configuration.yaml:
#   automation: !include automation_acond.yaml
# =============================================================================

# --- Synchronizace input_number s aktuální hodnotou z Modbusu ---
- id: acond_sync_room_temp_slider
  alias: "Acond - Sync pokojová teplota slider"
  trigger:
    - platform: homeassistant
      event: start
    - platform: state
      entity_id: sensor.acond_teplota_v_mistnosti_pozadovana
  condition:
    - condition: template
      value_template: >
        {{ states('sensor.acond_teplota_v_mistnosti_pozadovana') not in ['unknown', 'unavailable'] }}
  action:
    - service: input_number.set_value
      target:
        entity_id: input_number.acond_room_temp_target
      data:
        value: "{{ states('sensor.acond_teplota_v_mistnosti_pozadovana') | float }}"

- id: acond_sync_dhw_temp_slider
  alias: "Acond - Sync TUV teplota slider"
  trigger:
    - platform: homeassistant
      event: start
    - platform: state
      entity_id: sensor.acond_tuv_pozadovana
