# --- Odeslání nové pokojové teploty do TČ přes Modbus ---
- id: acond_set_room_temp
  alias: "Acond - Nastavit pokojovou teplotu"
  trigger:
    - platform: state
      entity_id: input_number.acond_room_temp_target
  condition:
    - condition: template
      value_template: >
        {{ trigger.from_state.state not in ['unknown', 'unavailable'] }}
  action:
    - service: modbus.write_register
      data:
        hub: acond
        slave: 2
        address: 0
        value: "{{ (states('input_number.acond_room_temp_target') | float * 10) | int }}"

