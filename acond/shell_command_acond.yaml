# =============================================================================
# Acond TČ - Shell příkazy pro HTTP ovládání Tecomat Foxtrot
# =============================================================================
#
# Modbus write holding registrů na tomto FW nefunguje (ignoruje zápis).
# Veškerý zápis hodnot jde přes HTTP POST na web rozhraní Tecomatuhu.
#
# Přidej do configuration.yaml:
#   shell_command: !include shell_command_acond.yaml
# =============================================================================

# --- Zápis teplot (čte aktuální hodnotu z HA input_number) ---
acond_set_room_temp: /config/scripts/acond_set_temp.sh room
acond_set_dhw_temp: /config/scripts/acond_set_temp.sh dhw

# --- TUV časový plán (zapnutí/vypnutí) ---
acond_dhw_schedule_off: /config/scripts/acond_write.sh PAGE51.XML "__R805.4_BOOL_i=0"
acond_dhw_schedule_on: /config/scripts/acond_write.sh PAGE51.XML "__R805.4_BOOL_i=1"
