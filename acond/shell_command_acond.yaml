# =============================================================================
# Acond TČ - Shell příkazy pro zápis do Tecomat Foxtrot přes HTTP POST
# Používá wrapper skript acond_write.sh (credentials v acond_config.sh)
# =============================================================================
#
# Přidej do configuration.yaml:
#   shell_command: !include shell_command_acond.yaml
# =============================================================================

# --- Nastavení pokojové teploty 1. okruh (R190) ---
acond_set_room_temp: /config/scripts/acond_write.sh PAGE49.XML "__R190_REAL_.1f={{ temperature }}"

# --- Nastavení TUV teploty (R815) ---
acond_set_dhw_temp: /config/scripts/acond_write.sh PAGE49.XML "__R815_REAL_.1f={{ temperature }}"

# --- Vypnutí časového plánu TUV (R805.4=0) → volný ohřev ---
acond_dhw_schedule_off: /config/scripts/acond_write.sh PAGE51.XML "__R805.4_BOOL_i=0"

# --- Zapnutí časového plánu TUV (R805.4=1) → zpět na plán ---
acond_dhw_schedule_on: /config/scripts/acond_write.sh PAGE51.XML "__R805.4_BOOL_i=1"

# --- Kvitace alarmu (R6787.5=1) → potvrzení/reset chyby ---
acond_alarm_acknowledge: /config/scripts/acond_write.sh PAGE49.XML "__R6787.5_BOOL_i=1"
