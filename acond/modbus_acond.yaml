# =============================================================================
# Acond TČ - Home Assistant Modbus konfigurace
# Firmware: ModbusTCP v2.34+
# Komunikace: Modbus TCP, Int x10 (teploty), Big Endian
# =============================================================================
#
# DŮLEŽITÉ:
#   - Slave ID = 0 (ne 1 jak uvádí PDF!) - ověřeno raw testem
#   - Tecomat Foxtrot má limit TCP spojení, používáme jedno Modbus spojení
#   - Input registers (FC4) pro čtení, Holding (FC3/6/16) pro čtení i zápis
#
# Přidej do configuration.yaml:
#   modbus: !include modbus_acond.yaml
# =============================================================================

- name: acond
  type: tcp
  host: !secret acond_host
  port: 502
  delay: 1
  timeout: 10
  retries: 3
  message_wait_milliseconds: 300

  # ---------------------------------------------------------------------------
  # SENZORY - Input registry (read-only, function code 4)
  # ---------------------------------------------------------------------------
  sensors:
    # === KLÍČOVÉ TEPLOTY (scan 30s) ===

    - name: "Acond Teplota v místnosti"
      unique_id: acond_room_temp
      address: 1             # 30002 T_act_indoor1
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      precision: 1
      scan_interval: 30

    - name: "Acond TUV aktuální"
      unique_id: acond_dhw_temp
      address: 5             # 30006 T_act_TUV
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      precision: 1
      scan_interval: 30

    - name: "Acond Status TČ raw"
      unique_id: acond_tc_status_raw
      address: 6             # 30007 TC_status
      slave: 2
      input_type: input
      data_type: uint16
      scan_interval: 30

    # POZN: Registry 20-23 (err_number, comp_rpm) vrací exception na tomto FW
    # Chybové kódy a otáčky kompresoru zatím nedostupné

    # === SETPOINTY A PROVOZ (scan 60s) ===

    - name: "Acond Teplota v místnosti požadovaná"
      unique_id: acond_room_temp_setpoint
      address: 0             # 30001 T_set_indoor1
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      precision: 1
      scan_interval: 60

    - name: "Acond TUV požadovaná"
      unique_id: acond_dhw_temp_setpoint
      address: 4             # 30005 T_set_TUV
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      precision: 1
      scan_interval: 60

    - name: "Acond Venkovní teplota"
      unique_id: acond_outdoor_temp
      address: 9             # 30010 T_act_air
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      precision: 1
      scan_interval: 60

    - name: "Acond Teplota zpátečky"
      unique_id: acond_water_back_temp
      address: 8             # 30009 T_act_water_back
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      precision: 1
      scan_interval: 60

    - name: "Acond Teplota výstup"
      unique_id: acond_outlet_temp
      address: 17            # 30018 T_act_water_outlet
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      precision: 1
      scan_interval: 60

    - name: "Acond Režim TČ raw"
      unique_id: acond_mode_raw
      address: 13            # 30014 rezim_pan
      slave: 2
      input_type: input
      data_type: int16
      scan_interval: 60

    - name: "Acond Typ regulace raw"
      unique_id: acond_regulation_type_raw
      address: 14            # 30015 typ_reg_pan
      slave: 2
      input_type: input
      data_type: int16
      scan_interval: 60

    # === MÉNĚ KRITICKÉ (scan 120s) ===

    - name: "Acond Teplota místnost 2"
      unique_id: acond_room_temp_2
      address: 3             # 30004 T_act_indoor2
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      state_class: measurement
      precision: 1
      scan_interval: 120

    - name: "Acond Teplota zpátečky požadovaná"
      unique_id: acond_water_back_setpoint
      address: 7             # 30008 T_set_water_back
      slave: 2
      input_type: input
      data_type: int16
      scale: 0.1
      device_class: temperature
      unit_of_measurement: "°C"
      precision: 1
      scan_interval: 120

    - name: "Acond Heartbeat"
      unique_id: acond_heartbeat
      address: 16            # 30017 HeartBeat
      slave: 2
      input_type: input
      data_type: int16
      scan_interval: 120

    # POZN: Chybové kódy (addr 21-22) zatím nedostupné na tomto FW

    # POZN: Holding registry (FC3 čtení) způsobují ILLEGAL DATA ADDRESS na TČ.
    # Write (FC6) funguje - používáme jen pro zápis v automatizacích.
    # Čtení setpointů jde přes input registry (FC4) výše.
