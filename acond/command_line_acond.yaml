# =============================================================================
# Acond TČ - Command line senzory (data nedostupná přes Modbus protokol)
# =============================================================================
#
# Hodnoty z web rozhraní Tecomat Foxtrot. Poller skript (acond_web_poller.sh)
# se přihlásí jedním TCP spojením, přečte vše a uloží do JSON.
# Senzory čtou z lokálního /tmp/acond_web_state.json → žádné extra TCP.
#
# Přidej do configuration.yaml:
#   command_line: !include command_line_acond.yaml
# =============================================================================

# --- Poller: spouští se každých 5 minut, aktualizuje JSON ---
- sensor:
    name: "Acond Web Poller"
    unique_id: acond_web_poller
    command: /config/scripts/acond_web_poller.sh && cat /tmp/acond_web_state.json
    command_timeout: 15
    scan_interval: 300
    value_template: "{{ value_json.timestamp | default('error') }}"
    json_attributes:
      - hdo_block
      - tuv_schedule
      - tuv_heating_enabled
      - heating_schedule
      - night_setback
      - temp_output
      - night_from
      - night_to
