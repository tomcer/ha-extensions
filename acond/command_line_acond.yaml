# =============================================================================
# Acond TČ - Command line senzory (čtení dat z web rozhraní)
# Používá wrapper skript acond_read.sh (credentials v acond_config.sh)
# =============================================================================
#
# Přidej do configuration.yaml:
#   command_line: !include command_line_acond.yaml
# =============================================================================

# --- Text chyby/alarmu z web rozhraní ---
- sensor:
    name: "Acond Alarm text"
    unique_id: acond_alarm_text
    command: /config/scripts/acond_read.sh PAGE49.XML 's/.*R6513_STRING\[80\]_s" VALUE="\([^"]*\)".*/\1/p'
    scan_interval: 60
    value_template: "{{ value if value else 'OK' }}"
